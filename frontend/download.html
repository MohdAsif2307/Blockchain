<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Marketplace - Download</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .success-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .success-icon {
      font-size: 80px;
      margin-bottom: 20px;
      animation: bounce 0.6s ease;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    .success-container h2 {
      font-size: 28px;
      color: #4CAF50;
      margin-bottom: 10px;
    }
    .success-container p {
      color: #666;
      margin-bottom: 30px;
    }
    .download-info {
      background: #f5f5f5;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 30px;
      text-align: left;
      max-width: 500px;
    }
    .download-info div {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #e0e0e0;
    }
    .download-info div:last-child {
      border-bottom: none;
    }
    .download-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <!-- ========== SCREEN 8: Download ========== -->
  <div class="success-container">
    <div class="success-icon">✅</div>
    <h2>Purchase Successful!</h2>
    <p>Your dataset has been downloaded successfully</p>

    <div class="download-info">
      <div>
        <strong>Dataset</strong>
        <span id="download-dataset">Dataset Name</span>
      </div>
      <div>
        <strong>Total Amount</strong>
        <span id="download-amount">₹177</span>
      </div>
      <div>
        <strong>Status</strong>
        <span style="color: #4CAF50;">✓ Completed</span>
      </div>
    </div>

    <div class="download-actions">
      <a href="#" class="btn-primary" onclick="downloadDataset()">📥 Download File</a>
      <a href="#" class="btn-secondary" onclick="viewBrowser()">🔍 View in Browser</a>
    </div>

    <a href="dashboard.html" class="btn-link" style="margin-top: 20px;">← Back to Dashboard</a>
  </div>

  <script>
    // Load order information
    const dataset = JSON.parse(localStorage.getItem('selectedDataset') || '{}');
    const total = localStorage.getItem('orderTotal') || '177';

    if (dataset.title) {
      document.getElementById('download-dataset').textContent = dataset.title;
    }
    document.getElementById('download-amount').textContent = '₹' + total;

    function downloadDataset() {
      // Simulated download
      alert('Dataset download started: ' + (dataset.title || 'dataset') + '.zip');
    }

    function viewBrowser() {
      alert('Opening dataset preview in new tab...');
    }
  </script>
</body>
</html>
